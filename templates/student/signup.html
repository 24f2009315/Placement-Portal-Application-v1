{% extends "company/layout.html" %}
{% block body %}

<div class="signup-form">

    <!-- ================= DEGREE SELECTION (GET) ================= -->
    <form method="get" action="{{ url_for('auth_api.student_signup') }}">
        <div class="row">
            <div class="col">
                <label class="form-label">Degree</label>
                <select class="form-select" name="degree" onchange="this.form.submit()" required>
                    <option value="">Select Degree</option>
                    <option value="BTech" {% if selected_degree == "BTech" %}selected{% endif %}>
                        B.Tech
                    </option>
                    <option value="MTech" {% if selected_degree == "MTech" %}selected{% endif %}>
                        M.Tech
                    </option>
                </select>
            </div>
        </div>
    </form>

    <br>

    <!-- ================= REGISTRATION FORM (POST) ================= -->
    {% if selected_degree %}
    <form method="post" action="{{ url_for('auth_api.student_signup') }}">
        <input type="hidden" name="degree" value="{{ selected_degree }}">

        <h3>Student Registration</h3>

        <!-- Name & Username -->
        <div class="row">
            <div class="col">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>
            <div class="col">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required>
            </div>
        </div>

        <!-- Password & Roll No -->
        <div class="row">
            <div class="col">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <div class="col">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" name="roll_no" required>
            </div>
        </div>

        <!-- Phone & Department -->
        <div class="row">
            <div class="col">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone" required>
            </div>
            <div class="col">
                <label class="form-label">Department</label>
                <select class="form-select" name="department" required>
                    <option value="">Select Department</option>

                    {% if selected_degree == "BTech" %}
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="CE">CE</option>
                        <option value="ME">ME</option>
                    {% elif selected_degree == "MTech" %}
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="ME">ME</option>
                    {% endif %}
                </select>
            </div>
        </div>

        <!-- Batch Year & CGPA -->
        <div class="row">
            <div class="col">
                <label class="form-label">Batch Year</label>
                <input type="number" class="form-control" name="batch_year" required>
            </div>
            <div class="col">
                <label class="form-label">CGPA</label>
                <input type="number" step="0.01" class="form-control" name="cgpa" required>
            </div>
        </div>

        <!-- Resume -->
        <div class="row">
            <div class="mb-3">
                <label class="form-label">Resume URL</label>
                <input type="url" class="form-control" name="resume_url" required>
            </div>
        </div>

        <br>

        <button type="submit" class="btn btn-primary">Register</button>
        <a href="/" class="btn btn-secondary">Back</a>

    </form>
    {% endif %}

</div>

{% endblock %}
