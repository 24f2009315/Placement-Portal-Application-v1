{% extends "student/layout.html" %}
{% block body %}

<div class="signup-form">

    <!-- ================= DEGREE SELECTION (GET) ================= -->
    <form method="get" action="{{ url_for('auth_api.student_signup') }}">
        <div class="row">
            <div class="col">
                <label class="form-label">Degree</label>
                <select class="form-select" name="degree" onchange="this.form.submit()" required>
                    <option value="">Select Degree</option>
                    <option value="BTech" {% if selected_degree == "BTech" %}selected{% endif %}>
                        B.Tech
                    </option>
                    <option value="MTech" {% if selected_degree == "MTech" %}selected{% endif %}>
                        M.Tech
                    </option>
                </select>
            </div>
        </div>
    </form>

    <br>

    <!-- ================= REGISTRATION FORM (POST) ================= -->
    {% if selected_degree %}
    <form method="post" action="{{ url_for('auth_api.student_signup') }}">
        <input type="hidden" name="degree" value="{{ selected_degree }}">

        <h3>Student Registration</h3>

        <!-- Name & Username -->
        <div class="row">
            <div class="col-md-6 col-12">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" name="name" required minlength="3" maxlength="50" pattern="[A-Za-z ]+">
            </div>
            <div class="col-md-6 col-12">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" required minlength="4" maxlength="20" pattern="[A-Za-z0-9_]+">
            </div>
        </div>

        <!-- Password & Roll No -->
        <div class="row">
            <div class="col-lg-4 col-md-6 col-12">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required minlength="8">
            </div>
            <div class="col-lg-4 col-md-6 col-12">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" name="confirm_password" required minlength="8">
            </div>
            <div class="col-lg-4 col-md-6 col-12">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" name="roll_no" required pattern="[A-Za-z0-9]+" minlength="6" maxlength="15" required>
            </div>
        </div>

        <!-- Phone & Department -->
        <div class="row">
            <div class="col-md-6 col-12">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" name="phone" required pattern="[0-9]{10}">
            </div>
            <div class="col-md-6 col-12">
                <label class="form-label">Department</label>
                <select class="form-select" name="department" required>
                    <option value="">Select Department</option>

                    {% if selected_degree == "BTech" %}
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="EEE">EEE</option>
                        <option value="CE">CE</option>
                        <option value="ME">ME</option>
                    {% elif selected_degree == "MTech" %}
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="ME">ME</option>
                    {% endif %}
                </select>
            </div>
        </div>

        <!-- Batch Year & CGPA -->
        <div class="row">
            <div class="col-md-6 col-12">
                <label class="form-label">Batch Year</label>
                <input type="number" class="form-control" name="batch_year" required min="2015" max="2035">
            </div>
            <div class="col-md-6 col-12">
                <label class="form-label">CGPA</label>
                <input type="number" step="0.01" class="form-control" name="cgpa" required min="0" max="10">
            </div>
        </div>

        <!-- Resume -->
        <div class="row">
            <div class="mb-3">
                <label class="form-label">Resume URL</label>
                <input type="url" class="form-control" name="resume_url" required>
            </div>
        </div>

        <br>

        <button type="submit" class="btn btn-primary">Register</button>
        <a href="/" class="btn btn-secondary">Back</a>

    </form>
    {% endif %}

</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const forms = document.querySelectorAll("form[method='post']");

    forms.forEach(form => {
        form.addEventListener("submit", function (e) {

            const password = form.querySelector("input[name='password']");
            const confirmPassword = form.querySelector("input[name='confirm_password']");

            // 1️⃣ Password strength check
            const strongPassword = /^(?=.*[A-Z])(?=.*[0-9]).{8,}$/;

            if (!strongPassword.test(password.value)) {
                alert("Password must be at least 8 characters, contain 1 uppercase letter and 1 number.");
                e.preventDefault();
                return;
            }

            // 2️⃣ Confirm password match
            if (confirmPassword && password.value !== confirmPassword.value) {
                alert("Passwords do not match.");
                e.preventDefault();
                return;
            }

        });
    });

});
</script>
{% endblock %}
