{% extends "company/layout.html" %}
{% block body %}
<div class="signup-form">
    <form action="{{ url_for('auth_api.company_signup') }}" method="post">
      <h3>Company Registration</h3>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" name="name" required minlength="3" maxlength="100" placeholder="Enter your username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" required minlength="4" maxlength="20" pattern="[A-Za-z0-9_]+" placeholder="Enter your username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Enter your password" required minlength="8">
      </div>
      <div class="col">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" name="confirm_password" required minlength="8">
      </div>
      <div class="mb-3">
        <label class="form-label">HR Contact</label>
        <input type="text" class="form-control" name="hr_contact" placeholder="Enter your username" required pattern="[0-9]{10}">
      </div>
      <div class="mb-3">
        <label class="form-label">Website</label>
        <input type="text" class="form-control" name="website" placeholder="Enter your username" required>
      </div>
      <button type="submit" class="btn btn-primary">Register</button>
    </form><br>
    <a href="/"><button type="submit" class="btn btn-primary">Back</button></a>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const forms = document.querySelectorAll("form[method='post']");

    forms.forEach(form => {
        form.addEventListener("submit", function (e) {

            const password = form.querySelector("input[name='password']");
            const confirmPassword = form.querySelector("input[name='confirm_password']");

            // 1️⃣ Password strength check
            const strongPassword = /^(?=.*[A-Z])(?=.*[0-9]).{8,}$/;

            if (!strongPassword.test(password.value)) {
                alert("Password must be at least 8 characters, contain 1 uppercase letter and 1 number.");
                e.preventDefault();
                return;
            }

            // 2️⃣ Confirm password match
            if (confirmPassword && password.value !== confirmPassword.value) {
                alert("Passwords do not match.");
                e.preventDefault();
                return;
            }

        });
    });

});
</script>
{% endblock %}
